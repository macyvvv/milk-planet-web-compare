<script>
	$(function() {
	    var $header = $('#top-head');

	    // ナビトップに固定
	    $(window).scroll(function() {
	      if ($(window).scrollTop() > 300) {
	        $header.addClass('fixed');
	      } else {
	        $header.removeClass('fixed');
	      }
	    });
	    $(window).scroll(function() {
	      if ($(window).scrollTop() > 500) {
	        $('#gotop').show("slow");
	      } else {
	        $('#gotop').hide('slow');
	      }
	    });

	    // ナビボタン開閉
	    $('#nav-toggle').click(function(){
	      $header.toggleClass('open');
	    });
	    $('#global-nav ul li a').click(function(){
	      $header.removeClass('open');
	    });

	    $('.pullhead').click(function(){
	      $(this).next().slideToggle('fast');
	    });
	    $('.pullhead').click(function(){
	    	if ($(this).hasClass('close')) {
	      		$(this).removeClass('close');
	      		$(this).addClass('open');
	      	} else {
	          	$(this).removeClass('open');
	            $(this).addClass('close');
	        }
	    });

	   // スムーズスクロール
	   $('a[href^=#]').click(function() {
	      // スクロールの速度
	      var speed = 400; // ミリ秒で記述
	      var href= $(this).attr("href");
	      var target = $(href == "#" || href == "" ? 'html' : href);
	      var position = target.offset().top;
	      $('body,html').animate({scrollTop:position}, speed, 'swing');
	      return false;
	   });
	});
</script>

<script>
  window.addEventListener('DOMContentLoaded', function () {
    var buttons = Array.prototype.slice.call(document.querySelectorAll('#list dd'));
    var parent = document.getElementById('boxes');
    var allBoxes = Array.prototype.slice.call(parent.children);

    function getAreaFromNode(node) {
      return node ? node.className : '';
    }

    function getAreaFromHash() {
      var hash = location.hash.replace('#', '');
      return hash || 'shandy';
    }

    function activate(area) {
      if (!area) return;

      var next = [];

      allBoxes.forEach(function (node) {
        if (node.classList.contains(area)) {
          next.push(node);
        }
      });

      while (parent.firstChild) {
        parent.removeChild(parent.firstChild);
      }

      next.forEach(function (node) {
        node.classList.remove('hidden');
        parent.appendChild(node);
      });

      buttons.forEach(function (dd) {
        dd.classList.toggle('active', dd.classList.contains(area));
      });
    }

    buttons.forEach(function (dd) {
      dd.addEventListener('click', function () {
        activate(getAreaFromNode(this));
      });
      dd.addEventListener('change', function () {
        activate(getAreaFromNode(this));
      });
    });

    window.addEventListener('hashchange', function () {
      activate(getAreaFromHash());
    });

    activate(getAreaFromHash());
  });
</script>

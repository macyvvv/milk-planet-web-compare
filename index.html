<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>milk planet web compare</title>
  <style>
    :root {
      --bg: #0e1116;
      --panel: #151a22;
      --panel-2: #1b2230;
      --text: #edf2f7;
      --muted: #9aa7b8;
      --accent: #7dd3fc;
      --line: rgba(255,255,255,.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font: 14px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(125,211,252,.14), transparent 34%),
        radial-gradient(circle at top right, rgba(244,114,182,.10), transparent 28%),
        var(--bg);
    }
    header {
      padding: 24px 20px 12px;
      border-bottom: 1px solid var(--line);
      background: rgba(0,0,0,.18);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    h1 { margin: 0 0 6px; font-size: 20px; }
    p { margin: 0; color: var(--muted); }
    .toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      text-decoration: none;
      border-radius: 999px;
    }
    .btn[aria-current="page"] { border-color: var(--accent); box-shadow: 0 0 0 1px rgba(125,211,252,.2) inset; }
    main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      padding: 16px;
      min-height: calc(100vh - 98px);
    }
    section {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .section-head {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }
    .section-head strong { font-size: 15px; }
    .section-head span { color: var(--muted); font-size: 12px; }
    iframe {
      width: 100%;
      border: 0;
      flex: 1;
      min-height: 80vh;
      background: white;
    }
    @media (max-width: 960px) {
      main { grid-template-columns: 1fr; }
      iframe { min-height: 72vh; }
    }
  </style>
</head>
<body>
  <header>
    <h1>milk planet web compare</h1>
    <p>左が currently、右が proposal。GitHub Pages でそのまま比較できる入口。</p>
    <div class="toolbar">
      <a class="btn" href="./clone/milk-planet.com/index.html" target="_blank" rel="noreferrer">currently を別タブで開く</a>
      <a class="btn" href="./proposal/index.html" target="_blank" rel="noreferrer">proposal を別タブで開く</a>
      <a class="btn" href="./basis/current_state.md" target="_blank" rel="noreferrer">現状整理</a>
    </div>
  </header>
  <main>
    <section>
      <div class="section-head">
        <strong>currently</strong>
        <span>現行サイトの複製</span>
      </div>
      <iframe src="./clone/milk-planet.com/index.html" title="currently"></iframe>
    </section>
    <section>
      <div class="section-head">
        <strong>proposal</strong>
        <span>比較用の改修モック</span>
      </div>
      <iframe src="./proposal/index.html" title="proposal"></iframe>
    </section>
  </main>
</body>
</html>
